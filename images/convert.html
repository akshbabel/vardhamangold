<!DOCTYPE html>
<html>
<head>
  <title>Logo Converter</title>
</head>
<body>
  <h1>Converting Logos...</h1>
  <div style="display: flex; gap: 20px;">
    <div>
      <h3>logo_v_transparent</h3>
      <textarea id="logo_v_trans" rows="10" cols="50"></textarea>
    </div>
    <div>
      <h3>logo_v_transparent_light</h3>
      <textarea id="logo_v_trans_light" rows="10" cols="50"></textarea>
    </div>
    <div>
      <h3>logo_full_transparent</h3>
      <textarea id="logo_full_trans" rows="10" cols="50"></textarea>
    </div>
    <div>
      <h3>logo_full_transparent_light</h3>
      <textarea id="logo_full_trans_light" rows="10" cols="50"></textarea>
    </div>
  </div>

  <script>
    window.status = "converting";
    
    function processImage(src, replaceDark, callback) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.src = src;
      img.onload = function() {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i];
          const g = data[i+1];
          const b = data[i+2];
          const a = data[i+3];
          
          // If close to white, make transparent
          if (r > 240 && g > 240 && b > 240) {
            data[i+3] = 0;
          } else if (replaceDark) {
            // If dark brown/black (r < 80, g < 70, b < 60), make it cream (#f6f0e4)
            if (r < 80 && g < 70 && b < 60) {
              data[i] = 246;   // R
              data[i+1] = 240; // G
              data[i+2] = 228; // B
            }
          }
        }
        
        ctx.putImageData(imgData, 0, 0);
        callback(canvas.toDataURL('image/png'));
      };
      img.onerror = function() {
        console.error("Failed to load image " + src);
      };
    }

    let completed = 0;
    const total = 4;
    
    function checkDone() {
      completed++;
      if (completed === total) {
        window.status = "done";
        document.querySelector('h1').innerText = "Conversion Done!";
      }
    }

    // Process all 4 versions
    processImage('logo_v_white.png', false, function(dataUrl) {
      document.getElementById('logo_v_trans').value = dataUrl;
      checkDone();
    });

    processImage('logo_v_white.png', true, function(dataUrl) {
      document.getElementById('logo_v_trans_light').value = dataUrl;
      checkDone();
    });

    processImage('logo_full_white.png', false, function(dataUrl) {
      document.getElementById('logo_full_trans').value = dataUrl;
      checkDone();
    });

    processImage('logo_full_white.png', true, function(dataUrl) {
      document.getElementById('logo_full_trans_light').value = dataUrl;
      checkDone();
    });
  </script>
</body>
</html>
